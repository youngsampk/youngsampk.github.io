name: Build site and generate sitemap/feed

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://youngsampk.github.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Render site with Quarto
        uses: quarto-dev/quarto-actions/render@v2

      - name: Generate sitemap
        run: python scripts/generate_sitemap.py --site-url "${{ env.SITE_URL }}" --input-dir docs --output docs/sitemap.xml

      - name: Generate RSS feed
        run: python scripts/generate_feed.py --site-url "${{ env.SITE_URL }}" --input-dir docs/posts --output docs/feed.xml --max-items 30

      - name: Ensure .nojekyll and naver verification exist
        run: |
          touch docs/.nojekyll
          if [ -f naver2a063c2d6ae9743ae82dd1391ae9557d.html ]; then
            cp naver2a063c2d6ae9743ae82dd1391ae9557d.html docs/
          fi

      - name: Commit sitemap/feed if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/sitemap.xml docs/feed.xml docs/.nojekyll docs/naver*.html || true
          git commit -m "chore(site): update sitemap and feed" || echo "no changes to commit"
          git push origin HEAD:main
