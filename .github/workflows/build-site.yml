name: Build site and generate sitemap/feed

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://youngsampk.github.io/labor_stat
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup-quarto@v1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Render site with Quarto
        run: quarto render

      - name: Generate sitemap
        run: python scripts/generate_sitemap.py --site-url "${{ env.SITE_URL }}" --input-dir docs --output docs/sitemap.xml

      - name: Generate RSS feed
        run: python scripts/generate_feed.py --site-url "${{ env.SITE_URL }}" --input-dir docs/posts --output docs/feed.xml --max-items 30

      - name: Commit sitemap/feed if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/sitemap.xml docs/feed.xml || true
          git commit -m "chore(site): update sitemap and feed" || echo "no changes to commit"
          git push origin HEAD:main
